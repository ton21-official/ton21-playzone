<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>T21 Play Zone</title>
  <link rel="icon" href="https://raw.githubusercontent.com/ton21-official/ton21_official/main/logo.png" />
  <style>
    body {
      background-color: #0b0b0f;
      color: #f0d173;
      font-family: "Segoe UI", Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    header {
      padding: 30px 10px 10px;
      animation: fadeIn 1.5s ease-out;
    }

    header img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 2px solid #f0d173;
      animation: glow 3s infinite alternate;
    }

    @keyframes glow {
      from { box-shadow: 0 0 10px #f0d173; }
      to { box-shadow: 0 0 25px #ffe794; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: 28px;
      margin-top: 10px;
      color: #f0d173;
    }

    p {
      color: #cfcfcf;
      font-size: 15px;
      margin: 5px 25px 25px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 80px);
      justify-content: center;
      gap: 15px;
      margin: 20px auto;
    }

    .num-btn {
      background: linear-gradient(180deg, #f0d173, #b68d35);
      color: #000;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      font-size: 20px;
      padding: 15px 0;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 4px 15px rgba(240,209,115,0.3);
    }

    .num-btn:hover {
      transform: scale(1.05);
      background: linear-gradient(180deg, #ffe794, #d6aa45);
    }

    #result {
      margin-top: 15px;
      font-size: 18px;
      color: #f0d173;
      min-height: 24px;
    }

    .prizes {
      color: #b5b5b5;
      font-size: 14px;
      margin-top: 10px;
    }

    .prizes span.active {
      color: #f0d173;
      font-weight: bold;
    }

    .wallet {
      color: #aaa;
      font-size: 14px;
      margin-top: 15px;
    }

    .footer {
      margin-top: 30px;
      font-size: 13px;
      color: #666;
    }

    .back-btn {
      display: inline-block;
      margin-top: 20px;
      background: #f0d173;
      color: #0b0b0f;
      font-weight: 600;
      padding: 10px 18px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: 0.25s;
    }

    .back-btn:hover {
      background: #ffe794;
      transform: scale(1.03);
    }
  </style>
</head>

<body>
  <header>
    <img src="https://raw.githubusercontent.com/ton21-official/ton21_official/main/logo.png" alt="Ton21 Logo" />
    <h1>🎯 T21 Play Zone</h1>
    <p>💎 Угадай число от 1 до 6 и выиграй Ton21!</p>
  </header>

  <main>
    <div class="grid">
      <button class="num-btn" onclick="guess(1)">1</button>
      <button class="num-btn" onclick="guess(2)">2</button>
      <button class="num-btn" onclick="guess(3)">3</button>
      <button class="num-btn" onclick="guess(4)">4</button>
      <button class="num-btn" onclick="guess(5)">5</button>
      <button class="num-btn" onclick="guess(6)">6</button>
    </div>

    <div id="result"></div>

    <div class="prizes">
      Возможные награды: 
      <br>
      <span id="p1">500</span> | 
      <span id="p2">700</span> | 
      <span id="p3">1000</span> | 
      <span id="p4">1500</span> | 
      <span id="p5">3000</span> | 
      <span id="p6">5000</span> | 
      <span id="p7">10000</span> Ton21
    </div>

    <div class="wallet">
      💎 Бесплатная демо-игра <br>
      🪙 Кошелёк для вывода: <b>UQAqZ3e_Qf1zX3AxcaLyjf7mOSDa-yfCi9ee9shKXIskdUs2</b>
    </div>

    <button class="back-btn" onclick="openPortal()">🏠 Ton21 Portal</button>
  </main>

  <div class="footer">
    © 2025 Ton21 Project — All rights reserved
  </div>

  <script>
    function guess(num) {
      const random = Math.floor(Math.random() * 6) + 1;
      const prizes = [500, 700, 1000, 1500, 3000, 5000, 10000];
      const prize = prizes[Math.floor(Math.random() * prizes.length)];
      const result = document.getElementById("result");

      // очистить подсветку
      document.querySelectorAll(".prizes span").forEach(p => p.classList.remove("active"));

      if (num === random) {
        result.innerHTML = `🎉 Ты угадал число ${num}!<br>🏆 Приз: ${prize} Ton21`;
        // подсветить выигранный приз
        const prizeIndex = prizes.indexOf(prize);
        if (prizeIndex >= 0) {
          document.getElementById("p" + (prizeIndex + 1)).classList.add("active");
        }
      } else {
        result.innerHTML = `😔 Не угадал. Было число ${random}. Попробуй снова!`;
      }
    }

    function openPortal() {
      try {
        if (window.Telegram && Telegram.WebApp) {
          Telegram.WebApp.openLink("https://ton21-official.github.io/ton21-portal/");
        } else {
          window.location.href = "https://ton21-official.github.io/ton21-portal/";
        }
      } catch (e) {
        window.location.href = "https://ton21-official.github.io/ton21-portal/";
      }
    }
  </script>
</body>
</html>
